<!doctype html><html lang='zh-CN'><head><meta charset='utf-8'><title>xttrader 边界</title><style>body{font-family:Arial,'Microsoft YaHei',sans-serif;margin:24px;background:#f7f8fb;color:#172033}.card{background:white;border-radius:12px;padding:16px;margin:12px 0;box-shadow:0 1px 6px #d7dce5}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#fee2e2;color:#991b1b;font-weight:700}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #e5e7eb;padding:8px;text-align:left}code,pre{white-space:pre-wrap;background:#0f172a;color:#e5e7eb;padding:12px;border-radius:8px}</style></head><body><h1>xttrader 边界 / 交易接口边界</h1><div class='grid'><div class='card'><b>xttrader：未接入</b></div><div class='card'><b>账户查询：关闭</b></div><div class='card'><b>真实下单：关闭</b></div><div class='card'><b>撤单能力：关闭</b></div><div class='card'><b>人工确认：必须</b></div><div class='card'><b>Risk Gate：必须</b><br><b>Kill Switch：必须</b></div></div><p><span class='badge'>DISABLED_FOR_SAFETY</span></p><nav>查看订单预览 · 查看安全边界 · 查看下一阶段计划</nav><section class='card'><h2>xttrader 配置状态</h2><div id='config'></div></section><section class='card'><h2>Import Guard</h2><div id='guard'></div></section><section class='card'><h2>账户查询闸门</h2><div id='account'></div></section><section class='card'><h2>下单闸门</h2><div id='submit'></div></section><section class='card'><h2>订单预览</h2><table><thead><tr><th>标的</th><th>方向</th><th>数量</th><th>参考价</th><th>预估金额</th><th>来源 Paper Order</th><th>风控结果</th><th>预览状态</th><th>阻断原因</th></tr></thead><tbody id='orders'></tbody></table></section><section class='card'><h2>安全扫描</h2><div id='safety'></div></section><section class='card'><h2>下一阶段计划</h2><div id='plan'></div></section><details class='card'><summary>原始 JSON 折叠区</summary><pre id='raw'></pre></details><script>async function j(u){return (await fetch(u)).json()} function show(id,o){document.getElementById(id).innerHTML='<pre>'+JSON.stringify(o,null,2)+'</pre>'} Promise.all([j('/api/v1/trading/xttrader-boundary/config'),j('/api/v1/trading/xttrader-boundary/import-guard'),j('/api/v1/trading/xttrader-boundary/account-query-gate'),j('/api/v1/trading/xttrader-boundary/order-submit-gate'),j('/api/v1/trading/xttrader-boundary/order-previews'),j('/api/v1/trading/xttrader-boundary/safety')]).then(([c,g,a,s,o,sa])=>{show('config',c);show('guard',g);show('account',a);show('submit',s);show('safety',sa);document.getElementById('orders').innerHTML=(o.order_previews||o.previews||[]).map(x=>`<tr><td>${x.symbol}</td><td>${x.side}</td><td>${x.quantity}</td><td>${x.reference_price}</td><td>${x.estimated_amount}</td><td>${x.source_paper_order_id}</td><td>${x.risk_decision}</td><td>${x.preview_status}</td><td>${x.block_reason}</td></tr>`).join('');document.getElementById('raw').textContent=JSON.stringify({c,g,a,s,o,sa},null,2)});j('/api/v1/trading/xttrader-boundary/report').then(r=>show('plan',r.report&&r.report.next_stage_plan||r))</script></body></html>
